<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="tramite.css">
</head>
<body>
    <header>
        <div class="logo-section">
            <span class="logo-text">gob<span class="logo-dot-pe">.pe</span></span>
        </div>       
        <div class="app-title">Mesa de Partes Virtual</div>        
    </header>
    <div class="container">
        <!--Screen 1: Consultar Estado del Tramite-->
        <section id="screen-status" class="screen active">
            <h2>Consultar estado del tramite</h2>
            <p class="screen-description">Al realizar un tramite en alguna oficina del Estado puedes realizar el seguimiento y obtener el reporte actual de un procedimiento administrativo.</p>
            <div class="form-group">
                <label for="doc-type">Selecciones una entidad para su procedimiento</label>
                <select id="doc-type">
                    <option>RENIEC - Registro Nacional de Identificacion y Estado Civil</option>
                </select>
            </div>       
            <div class="form-group">
                <label for="doc-number">Numero de documento</label>
                <input type="text" id="doc-number" placeholder="Ingrese numero de documento">
            </div>
            <div class="flex-end">
                <button class="btn btn-primary" onclick="showScreen('validation')">Consultar estado del tramite</button>
            </div>

        </section>

    </div>

    <footer class="main-footer">
        &copy; 2026 Registro Nacional de Identificacion y Estado Civil - RENIEC
    </footer>
    <script src="tramite.js"></script>
</body>
</html>
